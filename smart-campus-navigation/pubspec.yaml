name: smart_campus_navigation
description: A Smart Campus Navigation App for indoor and outdoor navigation using local landmarks.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Mapbox — official Maps SDK v2 (replaces deprecated mapbox_gl)
  mapbox_maps_flutter: ^2.3.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation / routing
  go_router: ^14.0.0

  # HTTP & networking
  http: ^1.2.1

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage (offline caching)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location & GPS
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # UI helpers
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/maps/campus_outdoor.geojson
    - assets/maps/buildings/
    - assets/data/landmarks.json
    - assets/data/campus_info.json
